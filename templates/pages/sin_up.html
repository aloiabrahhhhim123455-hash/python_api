<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0ea5e9, #1e293b);
            background-size: 400% 400%;
            animation: bg 10s ease infinite;
        }

        @keyframes bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 18px;
            width: 360px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            color: white;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 18px;

            border: none;
            border-radius: 10px;

            background: #0ea5e9;
            color: white;
            font-size: 16px;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {
            background: #0284c7;
            transform: scale(1.03);
        }

        .error {
            background: rgba(255,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        a {
            display: block;
            margin-top: 15px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>تسجيل الدخول</h2>

    {% if request.method == "POST" %}
        <div class="error">
            ❌ اسم المستخدم أو كلمة المرور غير صحيحة
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <a href="{% url 'register' %}">تسجيل حساب جديد</a>

</div>

</body>
</html>

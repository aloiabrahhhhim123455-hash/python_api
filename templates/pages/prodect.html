<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Dashboard</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: #f4f7fc;
        }

        .navbar{
            width: 100%;
            background: #0f172a;
            color: white;
            padding: 20px 50px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .container{
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .title{
            margin-bottom: 30px;
            color: #0f172a;
            font-size: 30px;
        }

        .form-group{
            margin-bottom: 25px;
        }

        label{
            display: block;
            margin-bottom: 10px;
            font-size: 18px;
            color: #333;
        }

        input[type="text"]{
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }

        input[type="text"]:focus{
            border-color: #2563eb;
            box-shadow: 0 0 10px rgba(37,99,235,0.3);
            outline: none;
        }

        .buttons{
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        button{
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }

        .save{
            background: #16a34a;
        }

        .save:hover{
            background: #15803d;
        }

        .edit{
            background: #f59e0b;
        }

        .edit:hover{
            background: #d97706;
        }

        .delete{
            background: #dc2626;
        }

        .delete:hover{
            background: #b91c1c;
        }

    </style>

</head>
<body>

    <div class="navbar">
        Product Management System
    </div>

    <div class="container">

        <h1 class="title">Manage Products</h1>

        <form method="post">

            {% csrf_token %}

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" placeholder="Enter product name">
            </div>

            <div class="form-group">
                <label>Description</label>
                <input type="text" name="description" placeholder="Enter description">
            </div>

            <div class="form-group">
                <label>Price</label>
                <input type="text" name="price" placeholder="Enter price">
            </div>

            <div class="buttons">

                <button type="submit" name="action" value="save" class="save">
                    Save
                </button>

                <button type="submit" name="action" value="edit" class="edit">
                    Edit
                </button>

                <button type="submit" name="action" value="delete" class="delete">
                    Delete
                </button>

            </div>

        </form>

    </div> 

</body>
</html>
